name: Insta Meal Bot

on:
  workflow_dispatch: # 수동 실행 버튼
  schedule:
    # 한국 시간(KST) 오후 10시에 매일 실행 (UTC 기준 13시)
    - cron: '0 13 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 에러 방지를 위해 3.10 이상 사용

      - name: Install dependencies
        run: |
          pip install instagrapi
          pip install Pillow
          # 한글 폰트가 깨질 경우를 대비해 나눔폰트 설치
          sudo apt-get -y install fonts-nanum

      - name: Run bot
        env:
          INSTA_ID: ${{ secrets.INSTA_ID }}
          INSTA_PW: ${{ secrets.INSTA_PW }}
        run: python main.py
